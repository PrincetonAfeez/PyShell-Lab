name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      # On Linux and macOS this exercises the fork/exec/pipe/redirection/signal
      # tests that are skipped on native Windows.
      - name: Run tests
        run: |
          ARGS="--cov=pyshell_lab --cov-report=term-missing"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ] || [ "${{ matrix.os }}" = "macos-latest" ]; then
            ARGS="$ARGS --cov-fail-under=85"
          fi
          python -m pytest $ARGS

  lint:
    name: lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Pinned toolchain from the lockfile so ruff/mypy results are deterministic.
      - run: python -m pip install -e . -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
